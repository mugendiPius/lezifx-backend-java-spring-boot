spring:
  application:
    name: lezifx-trading

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/lezifx_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 50
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 50

  flyway:
    enabled: false

  mail:
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${BREVO_USERNAME:${MAIL_USERNAME:}}
    password: ${BREVO_SMTP_KEY:${MAIL_PASSWORD:}}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
    test-connection: false

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  tomcat:
    connection-timeout: 30s
    keep-alive-timeout: 30s

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production-min-32-chars}
  access-token-expiry: 900
  refresh-token-expiry: 604800

superadmin:
  bootstrap-email: ${SUPER_ADMIN_EMAIL:admin@lezifx.com}
  bootstrap-password: ${SUPER_ADMIN_PASSWORD:changeme}
  master-api-key: ${SUPER_ADMIN_API_KEY:lzfx_master_lezifx2024superadminkey9x7z}

encryption:
  key: ${ENCRYPTION_KEY:dev-encryption-key-change-in-prod}

platform:
  social-feed:
    min-real-trades-threshold: 5
    simulated-interval-ms: 8000

daraja:
  base-url: ${DARAJA_BASE_URL:https://api.safaricom.co.ke}
  consumer-key: ${DARAJA_CONSUMER_KEY:}
  consumer-secret: ${DARAJA_CONSUMER_SECRET:}
  callback-base-url: ${CALLBACK_BASE_URL:https://lezifx-backend-java-spring-boot-production.up.railway.app}

lezifx:
  email:
    from-address: ${EMAIL_FROM_ADDRESS:noreply@lezifx.com}
    from-name: ${EMAIL_FROM_NAME:LeziFx}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

cors:
  allowed-origins: ${FRONTEND_URL:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

    minimum-breadcrumb-level: info
  in-app-includes:
    - com.lezifx.trading
  send-default-pii: false

logging:
  level:
    com.lezifx.trading: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    com.lezifx.trading.infrastructure.audit: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{tenantId}] [%X{userId}] %logger{36} - %msg%n"