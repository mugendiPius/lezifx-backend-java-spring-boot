[build]
builder = "NIXPACKS"
buildCommand = "chmod +x mvnw && ./mvnw clean package -DskipTests -q"

[deploy]
startCommand = "java -Xmx400m -Xms200m -XX:+UseContainerSupport -jar target/lezifx-trading-0.0.1-SNAPSHOT.jar"
healthcheckPath = "/actuator/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3